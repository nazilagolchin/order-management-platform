name: order-management-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_management
      POSTGRES_USER: order_service
      POSTGRES_PASSWORD: order_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_service -d order_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Separate container (not just a separate database in the order-service
  # instance) because each service owning its own database extends to owning
  # its own database infrastructure — see docs/architecture.md.
  inventory-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_management
      POSTGRES_USER: inventory_service
      POSTGRES_PASSWORD: inventory_service
    ports:
      - "5433:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_service -d inventory_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Kafka-API-compatible broker. Used instead of Kafka + Zookeeper because a
  # single Redpanda container gives the same producer/consumer contract our
  # services will speak from Milestone 2 onward, with a much faster local
  # startup and no separate coordination service to run.
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8082"
    depends_on:
      inventory-postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  inventory_postgres_data:
